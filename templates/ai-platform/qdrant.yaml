{{- if and .Values.aiPlatform.enabled .Values.aiPlatform.qdrant.enabled }}
{{- $ns := .Values.aiPlatform.namespace }}
{{- $v := .Values.aiPlatform.qdrant }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: qdrant-config
  namespace: {{ $ns }}
data:
  production.yaml: |
{{ $v.configYaml | indent 4 }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-data
  namespace: {{ $ns }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if $v.storageClassName }}
  storageClassName: {{ $v.storageClassName }}
  {{- end }}
  resources:
    requests:
      storage: {{ $v.storageSize }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
  namespace: {{ $ns }}
  labels:
    app: qdrant
spec:
  replicas: {{ $v.replicas }}
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "6333"
        prometheus.io/path: /metrics
    spec:
      containers:
        - name: qdrant
          image: {{ $v.image }}
          ports:
            - name: http
              containerPort: 6333
              protocol: TCP
            - name: grpc
              containerPort: 6334
              protocol: TCP
          env:
            - name: QDRANT__SERVICE__API_KEY
              valueFrom:
                secretKeyRef:
                  name: qdrant-secrets
                  key: api-key
            - name: QDRANT__SERVICE__ENABLE_CORS
              value: "false"
            - name: QDRANT__STORAGE__ON_DISK_PAYLOAD
              value: "true"
          resources:
            {{- toYaml $v.resources | nindent 12 }}
          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage
      volumes:
        - name: qdrant-storage
          persistentVolumeClaim:
            claimName: qdrant-data
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: {{ $ns }}
spec:
  type: ClusterIP
  selector:
    app: qdrant
  ports:
    - name: http
      port: 6333
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 6334
      targetPort: grpc
      protocol: TCP
{{- if $v.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qdrant
  namespace: {{ $ns }}
spec:
  ingressClassName: {{ $.Values.aiPlatform.ingress.className }}
  tls:
    - hosts:
        - {{ $v.ingress.host }}
      secretName: {{ $.Values.aiPlatform.ingress.tlsSecretName }}
  rules:
    - host: {{ $v.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qdrant
                port:
                  number: 6333
{{- end }}
{{- end }}
