{{- if and .Values.aiPlatform.enabled .Values.aiPlatform.vllm.enabled }}
{{- $ns := .Values.aiPlatform.namespace }}
{{- $v := .Values.aiPlatform.vllm }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: argus-vllm-config
  namespace: {{ $ns }}
data:
  model-name: {{ $v.modelName | quote }}
  max-model-len: {{ $v.maxModelLen | quote }}
  gpu-memory-utilization: {{ $v.gpuMemoryUtilization | quote }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: argus-vllm-model-cache
  namespace: {{ $ns }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if $v.storageClassName }}
  storageClassName: {{ $v.storageClassName }}
  {{- end }}
  resources:
    requests:
      storage: {{ $v.storageSize }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argus-vllm
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: argus-vllm
spec:
  replicas: {{ $v.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: argus-vllm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argus-vllm
    spec:
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: vllm
          image: {{ $v.image }}
          command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
          args:
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
            - --model
            - $(MODEL_NAME)
            - --served-model-name
            - llama3-8b
            - --download-dir
            - /models
            - --max-model-len
            - $(MAX_MODEL_LEN)
            - --gpu-memory-utilization
            - $(GPU_MEMORY_UTILIZATION)
            - --max-num-seqs
            - "64"
            - --max-num-batched-tokens
            - "16384"
            - --enable-prefix-caching
            - --enable-auto-tool-choice
            - --tool-call-parser
            - hermes
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: MODEL_NAME
              valueFrom:
                configMapKeyRef:
                  name: argus-vllm-config
                  key: model-name
            - name: MAX_MODEL_LEN
              valueFrom:
                configMapKeyRef:
                  name: argus-vllm-config
                  key: max-model-len
            - name: GPU_MEMORY_UTILIZATION
              valueFrom:
                configMapKeyRef:
                  name: argus-vllm-config
                  key: gpu-memory-utilization
            - name: HF_HOME
              value: /models/hf
            {{- if $.Values.aiPlatform.proxy.enabled }}
            - name: HTTP_PROXY
              value: {{ $.Values.aiPlatform.proxy.httpProxy }}
            - name: http_proxy
              value: {{ $.Values.aiPlatform.proxy.httpProxy }}
            - name: HTTPS_PROXY
              value: {{ $.Values.aiPlatform.proxy.httpsProxy }}
            - name: https_proxy
              value: {{ $.Values.aiPlatform.proxy.httpsProxy }}
            - name: NO_PROXY
              value: {{ $.Values.aiPlatform.proxy.noProxy }}
            - name: no_proxy
              value: {{ $.Values.aiPlatform.proxy.noProxy }}
            {{- end }}
          resources:
            {{- toYaml $v.resources | nindent 12 }}
          volumeMounts:
            - name: model-cache
              mountPath: /models
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: argus-vllm-model-cache
---
apiVersion: v1
kind: Service
metadata:
  name: argus-vllm
  namespace: {{ $ns }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: argus-vllm
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
{{- end }}
