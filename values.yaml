## epik8s-platform default values.
## Domain toggles + empty defaults. Site-specific data (IP pools, NAD subnets,
## storage server addresses, monitoring hostnames, ...) belongs in an
## environment values file such as values-k8sda.yaml - see README.md.

networking:
  enabled: true
  metallb:
    ## list of metallb.io/v1beta1 IPAddressPool specs: {name, addresses[], autoAssign, avoidBuggyIPs}
    pools: []
    ## list of metallb.io/v1beta1 L2Advertisement specs: {name, ipAddressPools[], nodeSelectors[]}
    advertisements: []
  ## list of k8s.cni.cncf.io/v1 NetworkAttachmentDefinitions: {name, namespace, config}
  nads: []

storage:
  enabled: true
  ## list of storage.k8s.io/v1 StorageClass specs:
  ## {name, provisioner, reclaimPolicy, volumeBindingMode, allowVolumeExpansion, mountOptions[], parameters{}}
  classes: []

## Cluster-wide inotify sysctl fix (kube-system DaemonSet) - see
## templates/sysctl-tuning/daemonset.yaml for the full "why" (confirmed live
## via Loki: ~140 unrelated pods across multiple nodes hitting "failed to
## create fsnotify watcher: too many open files" from
## fs.inotify.max_user_instances stuck at the Linux kernel default of 128).
sysctlTuning:
  enabled: true
  inotify:
    maxUserInstances: 1024
    maxUserWatches: 1048576

monitoring:
  kubePrometheusStack:
    enabled: true
  grafana:
    enabled: true

logging:
  ## Loki + Alloy for pod log troubleshooting - deliberately NOT the same
  ## Elasticsearch used under backend.* for olog/saverestore/channelfinder, which
  ## is genuinely control-critical (millions of live ChannelFinder docs) and
  ## shouldn't share resources with high-volume pod log ingestion. See README.md
  ## "Centralized logging".
  loki:
    enabled: true
  alloy:
    enabled: true

## LLM/MCP observability (LibreChat trace + feedback, ARGUS tool-call
## correlation) - deliberately its own toggle, not folded into logging.* or
## monitoring.*: it's application-level AI observability, not
## infrastructure/pod monitoring. See README.md "Observability: Langfuse".
langfuse:
  enabled: true

## kube-prometheus-stack subchart values (dependency name: kube-prometheus-stack)
kube-prometheus-stack: {}

## grafana subchart values (dependency name: grafana)
grafana: {}

## loki subchart values (dependency name: loki) - single-binary, filesystem storage,
## no object storage (S3/GCS/MinIO) - matches this cluster's scale, avoids standing
## up a whole extra storage backend just for a 7-day log retention window.
loki:
  deploymentMode: SingleBinary
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    limits_config:
      retention_period: 168h # 7 days - disposable troubleshooting data
      reject_old_samples: true
      reject_old_samples_max_age: 168h
    compactor:
      retention_enabled: true
      delete_request_store: filesystem
  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      size: 10Gi
  # SingleBinary mode doesn't need the scalable-mode read/write/backend targets or
  # object-storage-only minio - explicitly off rather than relying on chart defaults.
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0
  minio:
    enabled: false
  test:
    enabled: false
  lokiCanary:
    enabled: false
  # Memcached-backed query caches - a performance optimization, not required for
  # correctness at this scale. Off by default to keep the footprint minimal; turn
  # on if query latency ever becomes a real problem.
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false

## alloy subchart values (dependency name: alloy) - DaemonSet, ships every pod's logs
## to Loki via the Kubernetes API (loki.source.kubernetes), not hostPath log tailing.
## NOTE the double nesting: the chart dependency is named "alloy" (outer key, scopes
## everything below to that subchart), and the chart's OWN values.yaml separately has
## an internal top-level key ALSO called "alloy:" wrapping configMap/stabilityLevel -
## "rbac:" is a sibling of that inner key, not nested inside it. Easy to get wrong
## (this file did, initially) - verify with `helm template --show-only
## charts/alloy/templates/configmap.yaml` if this is ever restructured.
alloy:
  alloy:
    configMap:
      create: true
      content: |
        discovery.kubernetes "pods" {
          role = "pod"
        }

        discovery.relabel "pod_logs" {
          targets = discovery.kubernetes.pods.targets

          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "pod"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label  = "container"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_label_app"]
            target_label  = "app"
          }
          rule {
            source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_container_name"]
            separator     = "/"
            target_label  = "job"
          }
        }

        loki.source.kubernetes "pod_logs" {
          targets    = discovery.relabel.pod_logs.output
          forward_to = [loki.write.default.receiver]
        }

        loki.write "default" {
          endpoint {
            ## CHANGE ME per environment: the Loki single-binary Service's in-cluster
            ## DNS name, tied to whatever Helm release name epik8s-platform is
            ## installed as (confirmed by rendering: release "epik8s-platform" ->
            ## Service "epik8s-platform-loki" - see values-k8sda.yaml/values-generic.yaml).
            url = "http://loki.invalid.example/loki/api/v1/push"
          }
        }
    stabilityLevel: "generally-available"
  rbac:
    create: true
    clusterRules:
      - apiGroups: [""]
        resources: ["pods", "pods/log", "namespaces", "nodes"]
        verbs: ["get", "list", "watch"]

backend:
  enabled: true
  namespace: backend
  eckOperator:
    enabled: true
  strimziOperator:
    enabled: true

  elasticsearch:
    enabled: true
    version: "8.15.0"
    nodeCount: 1
    javaOpts: "-Xms1g -Xmx1g"
    storageSize: 50Gi
    resources:
      limits: { cpu: 2, memory: 4Gi }
      requests: { cpu: 1, memory: 2Gi }

  kibana:
    enabled: true
    version: "8.15.0"
    resources:
      limits: { cpu: 1, memory: 2Gi }
      requests: { cpu: 500m, memory: 1Gi }

  kafka:
    enabled: true
    clusterName: eph-kafka
    version: "4.1.0"
    metadataVersion: "4.1-IV1"
    config:
      default.replication.factor: 3
      min.insync.replicas: 2
      offsets.topic.replication.factor: 3
      transaction.state.log.min.isr: 2
      transaction.state.log.replication.factor: 3
    ## external LoadBalancer listener - disabled by default (needs a real MetalLB
    ## pool + IPs), see values-k8sda.yaml for the live config.
    externalAccess:
      enabled: false
      bootstrapLoadBalancerIP: ""
      brokers: [] ## list of {broker, loadBalancerIP}
    ## list of Strimzi KafkaNodePool specs: {name, replicas, roles[], storage{}, resources{}}
    nodePools:
      - name: eph-kafka-pool
        replicas: 3
        roles: [controller, broker]
        storage:
          type: persistent-claim
          size: 10Gi
          deleteClaim: false
        resources:
          limits: { cpu: 2, memory: 4Gi }
          requests: { cpu: 1, memory: 2Gi }

  mongo:
    enabled: true
    replicaCount: 1
    storageClassName: local-path
    storageSize: 10Gi
    resources:
      limits: { cpu: "2", memory: 2Gi }
      requests: { cpu: "1", memory: 1Gi }

## eck-operator subchart values (dependency name: eck-operator)
eck-operator:
  managedNamespaces: []
  installCRDs: true
  webhook:
    enabled: true
    port: 9443
  config:
    logVerbosity: "0"
    metricsPort: "0"
    maxConcurrentReconciles: "3"
  resources:
    limits: { cpu: "5", memory: 4Gi }
    requests: { cpu: "1", memory: 2Gi }

## strimzi-kafka-operator subchart values (dependency name: strimzi-kafka-operator)
strimzi-kafka-operator:
  watchNamespaces:
    - backend

aiPlatform:
  enabled: true
  namespace: ai-platform

  ## corporate proxy env vars injected into components that need outbound internet
  ## access (model downloads, pip installs, external MCP calls). Disabled by default;
  ## set per-environment (see values-k8sda.yaml) where a proxy is actually required.
  proxy:
    enabled: false
    httpProxy: ""
    httpsProxy: ""
    noProxy: ""

  ingress:
    className: nginx
    tlsSecretName: ai-platform-tls

  vllm:
    enabled: true
    image: vllm/vllm-openai:v0.6.3
    replicas: 1
    modelName: Qwen/Qwen2.5-3B-Instruct
    maxModelLen: "16384"
    gpuMemoryUtilization: "0.92"
    storageClassName: local-path
    storageSize: 50Gi
    resources:
      requests: { cpu: "4", memory: 16Gi, nvidia.com/gpu: "1" }
      limits: { cpu: "8", memory: 24Gi, nvidia.com/gpu: "1" }

  litellm:
    enabled: true
    image: ghcr.io/berriai/litellm:main-stable
    replicas: 2
    resources:
      requests: { cpu: 300m, memory: 512Mi }
      limits: { cpu: "2", memory: 2Gi }
    ingress:
      enabled: false
      host: ""
    configYaml: |
      model_list:
        - model_name: llama3-8b
          litellm_params:
            model: openai/llama3-8b
            api_base: http://vllm.ai-platform.svc.cluster.local:8000/v1
            api_key: none
      general_settings:
        completion_model: llama3-8b

  qdrant:
    enabled: true
    image: qdrant/qdrant:v1.12.4
    replicas: 1
    storageClassName: local-path
    storageSize: 80Gi
    resources:
      requests: { cpu: "1", memory: 2Gi }
      limits: { cpu: "4", memory: 8Gi }
    ingress:
      enabled: false
      host: ""
    configYaml: |
      log_level: INFO
      service:
        max_request_size_mb: 32
        max_workers: 4
      storage:
        on_disk_payload: true
        optimizers:
          indexing_threshold: 20000
          max_segment_size_kb: 256000
      cluster:
        enabled: false

  embeddings:
    enabled: true
    ## placeholder image until a real embeddings backend is deployed, see README.
    image: hashicorp/http-echo:1.0.0
    replicas: 2
    modelId: BAAI/bge-small-en-v1.5
    resources:
      requests: { cpu: "1", memory: 1Gi }
      limits: { cpu: "4", memory: 4Gi }

  mcp:
    enabled: true
    embeddingsUrl: http://embeddings.ai-platform.svc.cluster.local:80
    prometheusUrl: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
    qdrantUrl: http://qdrant.ai-platform.svc.cluster.local:6333
    ragDefaultCollection: confluence-docs
    ## epics-mcp / git-mcp are placeholders (hashicorp/http-echo) until real MCP
    ## backends are built, see README.
    placeholders:
      epics-mcp:
        enabled: true
        image: hashicorp/http-echo:1.0.0
        replicas: 2
        minReplicas: 2
        maxReplicas: 10
        resources:
          requests: { cpu: 100m, memory: 128Mi }
          limits: { cpu: "1", memory: 512Mi }
      git-mcp:
        enabled: true
        image: hashicorp/http-echo:1.0.0
        replicas: 2
        minReplicas: 2
        maxReplicas: 10
        resources:
          requests: { cpu: 100m, memory: 128Mi }
          limits: { cpu: "1", memory: 512Mi }
    kubernetesMcp:
      enabled: true
      image: python:3.11-slim
      replicas: 2
      minReplicas: 2
      maxReplicas: 10
      noProxy: "localhost,127.0.0.1,.svc,.cluster.local,10.0.0.0/8,192.168.0.0/16"
      resources:
        requests: { cpu: 250m, memory: 256Mi }
        limits: { cpu: "2", memory: 1Gi }
      ingress:
        enabled: false
        host: ""
    ragMcp:
      enabled: true
      image: python:3.11-slim
      replicas: 2
      minReplicas: 2
      maxReplicas: 10
      noProxy: "localhost,127.0.0.1,.svc,.cluster.local,10.0.0.0/8,192.168.0.0/16"
      resources:
        requests: { cpu: 200m, memory: 256Mi }
        limits: { cpu: "2", memory: 2Gi }

  ## Centralized chat frontend, replacing the old per-component "openwebui" -
  ## rendered as an ArgoCD Application sourcing argus-helm-chart's own repo
  ## (not a raw manifest, not a native Helm dependency - see README.md
  ## "Centralized LibreChat" for why).
  librechat:
    enabled: true
    applicationName: epik8s-platform-librechat
    project: default
    repoURL: "" ## CHANGE ME: argus-helm-chart's repo, see README.md
    targetRevision: main
    ingress:
      enabled: false
      className: nginx
      hosts:
        - host: ""
          paths:
            - path: /
              pathType: ImplementationSpecific
    auth:
      mode: basic
      basic:
        allowRegistration: true
        allowPasswordReset: true
        allowUnverifiedEmailLogin: false
    ## reuses the already-deployed litellm gateway rather than duplicating a
    ## direct-to-vllm endpoint - argus-helm-chart's own vllmService stays
    ## disabled, since this chart already has that "facility-wide singleton"
    ## (aiPlatform.vllm).
    llmEndpoints:
      - name: "LiteLLM Gateway"
        apiKeySecretKey: "LITELLM_API_KEY"
        baseURL: "http://litellm.ai-platform.svc.cluster.local:4000/v1"
        models:
          default: ["llama3-8b"]
          fetch: true
        titleConvo: true
        modelDisplayLabel: "LiteLLM Gateway"
    ## carries forward what openwebui's TOOL_SERVER_CONNECTIONS registered,
    ## so replacing the frontend doesn't drop existing capability.
    mcpServers:
      kubernetes-mcp:
        enabled: true
        type: streamable-http
        url: "http://kubernetes-mcp.ai-platform.svc.cluster.local:8080/mcp"
        chatMenu: true
        title: "Kubernetes Observability"
        description: "Cluster health, pod issues, node pressure, namespace usage."
      rag-mcp:
        enabled: true
        type: streamable-http
        url: "http://rag-mcp.ai-platform.svc.cluster.local:8080/mcp"
        chatMenu: true
        title: "Confluence RAG"
        description: "Search ingested Confluence chunks in Qdrant (LDCG by default)."
    ## The "possibility to add argus MCP": one entry per beamline that has
    ## deployed its own local argus-mcp server (via argus-helm-chart with
    ## argusMcp.enabled, librechat.enabled: false) - registers it into this
    ## central LibreChat instead of that beamline running its own LibreChat.
    ## port defaults to 8000, path defaults to "/sse" (argus-mcp's fixed SSE
    ## route - see argus-helm-chart/templates/librechat-configmap.yaml).
    ## serviceName is NOT simply "argus-mcp": argus-helm-chart's Helm naming
    ## convention makes it "<release-name>-argus-helm-chart-argus-mcp" unless
    ## that release set fullnameOverride - confirm with
    ## `kubectl get svc -n <beamline-namespace> | grep argus-mcp` before
    ## adding an entry here, don't assume.
    ## {name, namespace, serviceName, port, path, title, description}
    argusMcpServers: []

    ## A lean argus-mcp instance dedicated to THIS LibreChat (not any one
    ## beamline) - only for backends that make sense centrally, e.g. RAGFLOW
    ## documentation search. Reuses the same server-to-server integration
    ## BTF's own argus already uses (epik8s-btf/deploy/values.yaml) rather
    ## than the generic mcpServers bridge pattern, which that same beamline's
    ## docs note was tried and abandoned over SSRF/JWT issues - see
    ## argus-helm-chart/docs/architecture.md "ARGUS backend config vs. the
    ## mcpServers.argus entry". Disabled by default (site-specific).
    argusMcp:
      enabled: false
      image:
        repository: ghcr.io/infn-epics/argus-mcp-server
        tag: latest
      backends:
        documentation:
          backend: ragflow
        ragflow:
          baseUrl: ""

  confluenceIngester:
    enabled: true
    image: python:3.11-slim
    schedule: "0 */6 * * *"
    suspend: false
    noProxy: "localhost,127.0.0.1,.svc,.cluster.local,10.0.0.0/8,192.168.0.0/16"
    baseUrl: ""
    authType: bearer
    spaces: ""
    pageLimit: "50"
    sinceDays: "30"
    qdrantUrl: http://qdrant.ai-platform.svc.cluster.local:6333
    qdrantCollection: confluence-docs
    embeddingMode: auto
    embeddingsUrl: http://litellm.ai-platform.svc.cluster.local:4000/v1/embeddings
    embeddingsModel: text-embedding-3-small
    hashVectorSize: "384"
    chunkSize: "1100"
    chunkOverlap: "150"
    requestTimeoutSeconds: "30"

## langfuse subchart values (dependency name: langfuse) - the langfuse/langfuse
## chart bundles Postgres, ClickHouse (+ its own Zookeeper), Redis/Valkey, and
## MinIO as dependencies (one Helm dependency here, not four) - single-replica/
## dev-mode throughout, matching this cluster's scale (same posture as Loki's
## SingleBinary mode), not the chart's HA-by-default guidance. Every credential
## below is an existingSecret/secretKeyRef reference, never a literal value -
## see README.md "Observability: Langfuse" for the exact `kubectl create
## secret` commands that provision the real "langfuse-secrets" Secret this
## points at (not part of this chart, provisioned once, out of band).
langfuse:
  langfuse:
    salt:
      secretKeyRef:
        name: langfuse-secrets
        key: salt
    encryptionKey:
      secretKeyRef:
        name: langfuse-secrets
        key: encryption-key
    ## nextauth.url must be the real externally-reachable UI URL (used for
    ## session/redirect correctness) - overridden per-environment in
    ## values-k8sda.yaml; the localhost default here only matters if this
    ## chart is ever rendered without an environment overlay.
    nextauth:
      url: http://localhost:3000
      secret:
        secretKeyRef:
          name: langfuse-secrets
          key: nextauth-secret

  ## Explicit host/endpoint overrides below (postgresql.host/redis.host/
  ## clickhouse.host/s3.endpoint): the langfuse chart's own auto-derivation
  ## (used when these are left blank) computes each bundled datastore's
  ## expected Service name as "<release>-langfuse-<component>", but the
  ## actual rendered Service names are just "<release>-<component>" (no
  ## "-langfuse-" infix - confirmed by rendering and comparing against
  ## `kubectl get svc`) - a real mismatch in the upstream chart, not a
  ## naming choice made here. Assumes this domain is deployed with release
  ## name "epik8s-platform" (same assumption already documented for Loki's
  ## DNS name above).
  postgresql:
    deploy: true
    architecture: standalone
    host: epik8s-platform-postgresql
    auth:
      existingSecret: langfuse-secrets
      secretKeys:
        userPasswordKey: postgres-password
        adminPasswordKey: postgres-password

  redis:
    deploy: true
    architecture: standalone
    host: epik8s-platform-redis-primary
    auth:
      existingSecret: langfuse-secrets
      existingSecretPasswordKey: redis-password

  ## ClickHouse's own Bitnami subchart pulls in Zookeeper regardless of
  ## replicaCount (Langfuse's schema uses replicated table engines that need
  ## Keeper coordination even with a single replica) - real footprint is
  ## ClickHouse + Zookeeper, not just ClickHouse. replicaCount/resourcesPreset
  ## both explicitly downsized from the chart's HA-oriented defaults (3
  ## replicas, 2xlarge preset).
  clickhouse:
    deploy: true
    replicaCount: 1
    ## "small" (768Mi limit) crashlooped in practice - ClickHouse's own
    ## memory tracker reserves ~90% of that (691.2MiB) and hit
    ## MEMORY_LIMIT_EXCEEDED just from its own internal system logs
    ## (trace_log/metric_log/asynchronous_metric_log), before any real
    ## trace data. "medium" (1536Mi) is the smallest preset that ran
    ## stably - confirmed live, not a guess.
    resourcesPreset: medium
    host: epik8s-platform-clickhouse
    auth:
      existingSecret: langfuse-secrets
      existingSecretKey: clickhouse-password
    ## the clickhouse subchart's own default overrides zookeeper.replicaCount
    ## to 3 (HA posture) independently of clickhouse.replicaCount above -
    ## without this, "single-replica" ClickHouse would still bring a 3-node
    ## Zookeeper ensemble.
    zookeeper:
      replicaCount: 1
      resourcesPreset: nano

  s3:
    deploy: true
    endpoint: http://epik8s-platform-s3:9000
    auth:
      existingSecret: langfuse-secrets
      rootUserSecretKey: minio-root-user
      rootPasswordSecretKey: minio-root-password
