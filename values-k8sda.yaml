## Environment values reproducing the current k8sda cluster's platform state exactly.
## Generated from live kubectl/helm state on 2026-07-20 - see README.md for the
## verification procedure used to confirm this renders equivalently to what's live.

networking:
  enabled: true
  metallb:
    pools:
      - name: default-k8s-108
        addresses:
          - 192.168.108.220-192.168.108.254
        autoAssign: true
        avoidBuggyIPs: false
      - name: default-pool-10-6
        addresses:
          - 10.10.6.240-10.10.6.250
        autoAssign: true
        avoidBuggyIPs: false
      - name: default-pool-109
        addresses:
          - 192.168.109.240-192.168.109.250
        autoAssign: true
        avoidBuggyIPs: false
    advertisements:
      - name: advert-valan-10-6
        ipAddressPools:
          - default-pool-10-6
        nodeSelectors:
          - matchLabels:
              lb-network-access: vlan-10-6
      - name: advert-valan-108
        ipAddressPools:
          - default-k8s-108
        nodeSelectors:
          - matchLabels:
              lb-network-access: vlan-108
      - name: advert-valan-109
        ipAddressPools:
          - default-pool-109
        nodeSelectors:
          - matchLabels:
              lb-network-access: vlan-109
      ## NOTE: "l2" duplicates advert-valan-109 (same pool, same selector). Redundant
      ## but harmless - reproduced as-is rather than silently collapsed, see README.
      - name: l2
        ipAddressPools:
          - default-pool-109
        nodeSelectors:
          - matchLabels:
              lb-network-access: vlan-109

  nads:
    - name: btf-189
      namespace: btf
      config: |
        {
          "cniVersion": "0.3.1",
          "type": "ipvlan",
          "master": "eth0.189",
          "mode": "l2",
          "ipam": {
            "type": "host-local",
            "ranges": [
              [{
                "subnet": "192.168.189.0/24",
                "rangeStart": "192.168.189.240",
                "rangeEnd": "192.168.189.254"
              }]
            ]
          }
        }
    - name: btf-189
      namespace: default
      config: |
        {
          "cniVersion": "0.3.1",
          "type": "macvlan",
          "master": "eth0.189",
          "mode": "bridge",
          "ipam": {
            "type": "whereabouts",
            "range": "192.168.189.0/24",
            "range_start": "192.168.189.240",
            "range_end": "192.168.189.254",
            "gateway": "192.168.189.1",
            "routes": [
              { "dst": "0.0.0.0/0" }
            ],
            "kubernetes": {
              "kubeconfig": "/etc/cni/net.d/whereabouts.d/whereabouts.kubeconfig"
            }
          }
        }
    - name: euaps-cam-multinode
      namespace: default
      config: |-
        {
          "cniVersion": "0.3.1",
          "type": "bridge",
          "bridge": "br115",
          "isGateway": false,
          "isDefaultGateway": false,
          "ipMasq": false,
          "hairpinMode": false,
          "ipam": {
            "type": "whereabouts",
            "range": "192.168.115.0/24",
            "range_start": "192.168.115.150",
            "range_end": "192.168.115.250",
