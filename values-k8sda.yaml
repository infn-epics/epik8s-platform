storage:
  enabled: true
  classes:
    - name: nfs20t
      provisioner: nfs.csi.k8s.io
      reclaimPolicy: Retain
      volumeBindingMode: Immediate
      allowVolumeExpansion: true
      mountOptions:
        - hard
        - nfsvers=4
        - rw
      parameters:
        server: nas01a-148.lnf.infn.it
        share: /export/nfs/k8sda00
    - name: archiver-lts
      provisioner: nfs.csi.k8s.io
      reclaimPolicy: Retain
      volumeBindingMode: Immediate
      allowVolumeExpansion: true
      mountOptions:
        - hard
        - nfsvers=4.1
        - rw
      parameters:
        server: 192.168.197.157
        share: /data_epik8s/archiver/lts
    - name: archiver-mts
      provisioner: nfs.csi.k8s.io
      reclaimPolicy: Retain
      volumeBindingMode: Immediate
      allowVolumeExpansion: true
      mountOptions:
        - hard
        - nfsvers=4.1
        - rw
      parameters:
        server: 192.168.197.157
        share: /data_epik8s/archiver/mts
    ## NOTE: cephfs-rwx's live source of truth today is the "cephfs-config" ArgoCD
    ## Application (repo k8sda.git, path charts/cephfs-config) - codified here for
    ## completeness/reproducibility, not as a competing GitOps owner. See README.
    - name: cephfs-rwx
      provisioner: cephfs.csi.ceph.com
      reclaimPolicy: Retain
      volumeBindingMode: Immediate
      allowVolumeExpansion: true
      mountOptions:
        - debug
      parameters:
        clusterID: da-cephfs
        fsName: test-da
        csi.storage.k8s.io/provisioner-secret-name: csi-cephfs-secret
        csi.storage.k8s.io/provisioner-secret-namespace: ceph-csi-operator-system
        csi.storage.k8s.io/controller-expand-secret-name: csi-cephfs-secret
        csi.storage.k8s.io/controller-expand-secret-namespace: ceph-csi-operator-system
        csi.storage.k8s.io/node-stage-secret-name: csi-cephfs-secret
        csi.storage.k8s.io/node-stage-secret-namespace: ceph-csi-operator-system

monitoring:
  kubePrometheusStack:
    enabled: true
  grafana:
    enabled: true

logging:
  loki:
    enabled: true
  alloy:
    enabled: true

## loki subchart values override - this cluster's CoreDNS Service is not named
## "kube-dns" (RKE2's default is "rke2-coredns-rke2-coredns"), but the loki
## chart's nginx gateway hardcodes an nginx resolver built from
## global.dnsService/global.dnsNamespace (defaults "kube-dns"/"kube-system") -
## without this override the gateway container crashloops on startup
## ("host not found in resolver"). Confirmed via `kubectl get svc -n
## kube-system | grep dns` on this cluster.
loki:
  global:
    dnsService: rke2-coredns-rke2-coredns
    dnsNamespace: kube-system

## alloy subchart values override - real in-cluster DNS name for the Loki
## single-binary Service, assuming this chart is deployed with release name
## "epik8s-platform" into a "logging" namespace (confirmed by rendering, see
## README.md "Centralized logging" for how to re-derive this if either changes).
## NOTE the double "alloy: alloy:" nesting - see the comment in values.yaml.
alloy:
  alloy:
    configMap:
      content: |
        discovery.kubernetes "pods" {
          role = "pod"
        }

        discovery.relabel "pod_logs" {
          targets = discovery.kubernetes.pods.targets

          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "pod"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label  = "container"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_label_app"]
            target_label  = "app"
          }
          rule {
            source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_container_name"]
            separator     = "/"
            target_label  = "job"
          }
        }

        loki.source.kubernetes "pod_logs" {
          targets    = discovery.relabel.pod_logs.output
          forward_to = [loki.write.default.receiver]
        }

        loki.write "default" {
          endpoint {
            url = "http://epik8s-platform-loki.logging.svc.cluster.local:3100/loki/api/v1/push"
          }
        }

## kube-prometheus-stack subchart values, reconciled against the live "prometheus"
## helm release. NOTE: `helm get values` initially reported nodeExporter.extraArgs /
## hostNetwork / service.port(9200) as "user-supplied", but kube-prometheus-stack's
## enable flags (kubeStateMetrics.*, nodeExporter.* at this level) are only used for
## the dependency `condition:` - the actual pass-through values for those two
## subcharts live under the hyphenated `kube-state-metrics:` / `prometheus-node-exporter:`
## keys instead, so those settings were silently inert. Verified against the live
## DaemonSet: it actually runs on hostNetwork with the chart's default port 9100,
## not 9200. Reproduced here as what's ACTUALLY running, not what was attempted -
## flagged in README as a pre-existing inconsistency, not something to silently "fix".
kube-prometheus-stack:
  ## pins the exact resource names from the live "prometheus" helm release (this
  ## chart is now a dependency of an umbrella release, so it no longer inherits
  ## that release name for free - see README).
  fullnameOverride: prometheus-kube-prometheus
  alertmanager:
    enabled: false
  grafana:
    enabled: false ## grafana is deployed as its own separate release, see below
  kubeStateMetrics:
    enabled: true
  nodeExporter:
    enabled: true
  prometheus:
    prometheusSpec:
      hostNetwork: false
      serviceMonitorSelector: {}
      serviceMonitorSelectorNilUsesHelmValues: false
    service:
      port: 9090
      targetPort: 9090
  ## grandchild dependencies (kube-state-metrics, prometheus-node-exporter) are
  ## nested INSIDE kube-prometheus-stack's own chart tree, so their pass-through
  ## values must be scoped here, not at this file's top level.
  kube-state-metrics:
    fullnameOverride: prometheus-kube-state-metrics
  prometheus-node-exporter:
    fullnameOverride: prometheus-prometheus-node-exporter

## grafana subchart values - exact USER-SUPPLIED VALUES from the live "grafana" helm
## release (grafana-10.3.0), EXCEPT adminUser/adminPassword: the live release set
## these as literal values, which this chart must not reproduce in git. The admin
## credentials already exist as the "grafana" Secret (keys admin-user/admin-password)
## created by that release - referencing it via admin.existingSecret is functionally
## identical (same Secret object, unchanged) without committing the plaintext.
## See README.md "Secrets handling".
grafana:
  ## pins the exact resource name from the live "grafana" helm release, see the
  ## kube-prometheus-stack.fullnameOverride note above.
  fullnameOverride: grafana
  admin:
    existingSecret: grafana
    userKey: admin-user
    passwordKey: admin-password
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: SPARC EPICS Archiver
          type: sasaki77-archiverappliance-datasource
          access: proxy
          url: http://archiver.sparc.svc.cluster.local:17665
          isDefault: true
        - name: Loki
          type: loki
          access: proxy
          ## same "epik8s-platform" release name / "logging" namespace assumption as
          ## the alloy: block above - see README.md "Centralized logging".
          url: http://epik8s-platform-loki.logging.svc.cluster.local:3100
  env:
    GF_SERVER_ROOT_URL: https://grafana.k8sda.lnf.infn.it
  grafana.ini:
    plugins:
      allow_loading_unsigned_plugins: sasaki77-archiverappliance-datasource
    server:
      root_url: https://grafana.k8sda.lnf.infn.it
  plugins:
    - sasaki77-archiverappliance-datasource
  extraInitContainers:
    - name: install-custom-plugins
      image: grafana/grafana:latest
      command:
        - /bin/sh
        - -c
      args:
        - grafana-cli --pluginUrl https://github.com/sasaki77/archiverappliance-datasource/releases/latest/download/archiverappliance-datasource.zip
          plugins install sasaki77-archiverappliance-datasource;
      volumeMounts:
        - name: grafana-plugins
          mountPath: /var/lib/grafana/plugins
  extraVolumes:
    - name: grafana-plugins
      emptyDir: {}
  extraVolumeMounts:
    - name: grafana-plugins
      mountPath: /var/lib/grafana/plugins
  persistence:
    enabled: true
    ## live storage is a pre-existing, separately-managed PVC (ReadWriteMany on
    ## the nfs20t StorageClass codified above), not one the chart should create.
    existingClaim: grafana-nfs
    size: 20Gi
  service:
    type: ClusterIP
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.k8sda.lnf.infn.it
    path: /
    pathType: Prefix
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.k8sda.lnf.infn.it

## langfuse subchart values override - real UI hostname (nextauth.url must
## match this exactly for session/redirect correctness) and TLS, same
## nginx ingressClassName pattern as every other ingress in this file. The
## "langfuse-secrets" Secret this points at must be provisioned once, out
## of band - see README.md "Observability: Langfuse".
langfuse:
  langfuse:
    nextauth:
      url: https://langfuse.k8sda.lnf.infn.it
    ingress:
      enabled: true
      className: nginx
      ## without this, nginx has no valid cert for the host and silently
      ## falls back to its own default self-signed cert - Node's fetch()
      ## (LibreChat's own outbound calls to Langfuse) then hard-fails with
      ## "self-signed certificate" rather than a connection-refused/DNS
      ## error, which is what actually surfaced this live (see git history/
      ## session notes: LibreChat logged "[langfuse] feedback score failed:
      ## fetch failed", root-caused via a direct fetch() test from inside
      ## the LibreChat pod).
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: langfuse.k8sda.lnf.infn.it
          paths:
            - path: /
              pathType: Prefix
      tls:
        enabled: true
        secretName: langfuse-tls

aiPlatform:
  enabled: true
  namespace: ai-platform

  proxy:
    enabled: true
    httpProxy: http://squid.lnf.infn.it:3128
    httpsProxy: http://squid.lnf.infn.it:3128
    ## this is vllm's own NO_PROXY value specifically - other components set their
    ## own (narrower) noProxy field below, matching what's actually live.
    noProxy: "localhost,127.0.0.1,::1,10.0.0.0/8,192.168.0.0/16,.svc,.svc.cluster.local,.lnf.infn.it"

  ingress:
    className: nginx
    tlsSecretName: ai-platform-tls

  litellm:
    ingress:
      enabled: true
      host: litellm.k8sda.lnf.infn.it
    ## exact USER-SUPPLIED config from the live "litellm-config" ConfigMap.
    configYaml: |
      model_list:
        - model_name: gpt-4o-mini
          litellm_params:
            model: openai/llama3-8b
            api_base: http://vllm.ai-platform.svc.cluster.local:8000/v1
            api_key: none
        - model_name: llama3-8b
          litellm_params:
            model: openai/llama3-8b
            api_base: http://vllm.ai-platform.svc.cluster.local:8000/v1
            api_key: none
      general_settings:
        master_key: "change-me"
        completion_model: llama3-8b
        disable_spend_logs: true
        enforce_user_param: false
        # Optional soft rate-limit (requests/minute by key)
        max_requests_per_minute: 120
      router_settings:
        routing_strategy: simple-shuffle
        set_verbose: false

  qdrant:
    ## live PVC uses nfs20t (codified above under storage.classes), not local-path.
    storageClassName: nfs20t
    ingress:
      enabled: true
      host: qdrant.k8sda.lnf.infn.it

  mcp:
    kubernetesMcp:
      ingress:
        enabled: true
        host: k8sda-mcp.k8sda.lnf.infn.it

  ## NOTE: unlike the rest of this file, there is no live centralized
  ## LibreChat to reproduce here - this is new capability, not codification.
  ## repoURL is a placeholder for the same reason as the top-level
  ## epik8s-platform-in-epik8s-da-infra blocker: argus-helm-chart has no git
  ## remote yet. Ingress host is reused from the old openwebui deployment
  ## since LibreChat is taking over as the chat UI.
  librechat:
    ## matches argusDefaults.charturl in epik8s-chart's own values.yaml - the
    ## same repo every beamline's argus service already points at.
    repoURL: https://github.com/infn-epics/argus-helm-chart.git
    ingress:
      enabled: true
      hosts:
        - host: argus.k8sda.lnf.infn.it
          paths:
            - path: /
              pathType: ImplementationSpecific
    ## AI-Gateway-WP6/90 are the same two INFN AI Gateway instances BTF's own
    ## argus already uses (epik8-btf... epik8s-btf/deploy/values.yaml
    ## epicsConfiguration.services.argus.llm.endpoints) - reused here as-is, not
    ## reinvented. Credentials for all three (including LiteLLM Gateway's own
    ## master key) live only in the argus-librechat-credentials Secret, never
    ## in this file - see README.md "Secrets handling".
    llmEndpoints:
      - name: "LiteLLM Gateway"
        apiKeySecretKey: "LITELLM_API_KEY"
        baseURL: "http://litellm.ai-platform.svc.cluster.local:4000/v1"
        models:
          default: ["llama3-8b"]
          fetch: true
        titleConvo: true
        modelDisplayLabel: "LiteLLM Gateway"
      - name: "AI-Gateway-WP6"
        apiKeySecretKey: "AIGW_WP6_API_KEY"
        baseURL: "https://ai-gateway.131.154.99.68.myip.cloud.infn.it/v1"
        models:
          default: ["qwen36-27b"]
          fetch: false
        modelDisplayLabel: "AI-Gateway-WP6"
      - name: "AI-Gateway-90"
        apiKeySecretKey: "AIGW_90_API_KEY"
        baseURL: "https://ai-gateway.131.154.99.90.myip.cloud.infn.it/v1"
        models:
          default: ["minimax-m27","qwen36-27b-x2","qwen36-27b", "gemma-4-31b-it", "qwen35-122b-a10b-gptq-int4"]
          fetch: true
        modelDisplayLabel: "AI-Gateway-90"
    ## serviceName confirmed by rendering each beamline's computed argus values
    ## through argus-helm-chart directly (helm's naming convention for release
    ## name "argus" + chart name "argus-helm-chart", not simply "argus-mcp").
    argusMcpServers:
      ## sparc and euaps run argus-mcp only (librechat.enabled: false, see
      ## epik8-sparc/deploy/values.yaml and epik8s-euaps/deploy/values.yaml) -
      ## registered here instead of either running its own LibreChat.
      - name: sparc-argus
        namespace: sparc
        serviceName: argus-argus-helm-chart-argus-mcp
        title: "SPARC ARGUS"
        description: "ARGUS accelerator-control assistant for the SPARC beamline."
      - name: euaps-argus
        namespace: euaps
        serviceName: argus-argus-helm-chart-argus-mcp
        title: "EUAPS ARGUS"
        description: "ARGUS accelerator-control assistant for the EUAPS beamline."
      ## btf keeps running its OWN dedicated LibreChat too (2 BTF-specific
      ## AI-Gateway LLM endpoints) - epik8s-btf/deploy/values.yaml is
      ## untouched. This just makes the same already-running argus-mcp also
      ## reachable from the central LibreChat.
      - name: btf-argus
        namespace: btf
        serviceName: argus-argus-helm-chart-argus-mcp
        title: "BTF ARGUS"
        description: "ARGUS accelerator-control assistant for the BTF beamline."

    ## same RAGFLOW instance BTF's own argus already uses
    ## (epik8s-btf/deploy/values.yaml epicsConfiguration.services.argus.argusMcp.backends.ragflow).
    argusMcp:
      enabled: true
      backends:
        ragflow:
          baseUrl: "https://ragflow-api-lnf.131.154.99.90.myip.cloud.infn.it"
        ## shared, cluster-wide instance - not beamline-specific, so this
        ## central argus-mcp (unlike each beamline's own) can genuinely
        ## search logs across every namespace at once. Same URL as every
        ## beamline's own instance - see README.md "Centralized logging".
        loki:
          baseUrl: "http://epik8s-platform-loki.logging.svc.cluster.local:3100"
        ## argocd.serverUrl intentionally left unset here - a real ArgoCD API
        ## token is needed (anonymous/readonly access is disabled on this
        ## cluster's ArgoCD, confirmed via argocd-cm), and none of the
        ## existing per-beamline accounts (btfuser/sparc/euaps) are scoped
        ## for cross-beamline visibility, which is the whole point of wiring
        ## this into the *central* instance specifically. Needs a real
        ## decision (new dedicated read-only account vs. reusing an existing
        ## one) before this can be set - see PR/session notes.

  confluenceIngester:
    baseUrl: https://confluence.infn.it
    spaces: LDCG
    sinceDays: "36500"

backend:
  enabled: true
  namespace: backend

  elasticsearch:
    ## live PVC has no explicit storageClassName -> uses the cluster default
    ## (local-path, already codified as default in storage.classes).
    storageSize: 50Gi

  mongo:
    ## live PVC uses archiver-lts (codified above under storage.classes).
    storageClassName: archiver-lts

  kafka:
    ## external LoadBalancer listener - IPs come from the default-k8s-108 MetalLB
    ## pool already codified under networking.metallb.pools.
    externalAccess:
      enabled: true
      bootstrapLoadBalancerIP: 192.168.108.251
      brokers:
        - broker: 0
          loadBalancerIP: 192.168.108.252
        - broker: 1
          loadBalancerIP: 192.168.108.253
        - broker: 2
          loadBalancerIP: 192.168.108.254
    ## NOTE: two node pools exist live for the same "eph-kafka" cluster - "dual"
    ## (ephemeral storage, no resource limits) looks like a leftover from an
    ## earlier migration, alongside "eph-kafka-pool" (persistent, resourced).
    ## Reproduced as-is rather than silently collapsed, see README.
    nodePools:
      - name: dual
        replicas: 3
        roles: [broker, controller]
        storage:
          type: jbod
          volumes:
            - id: 0
              type: ephemeral
              kraftMetadata: shared
      - name: eph-kafka-pool
        replicas: 3
        roles: [controller, broker]
        storage:
          type: persistent-claim
          size: 10Gi
          deleteClaim: false
        resources:
          limits: { cpu: 2, memory: 4Gi }
          requests: { cpu: 1, memory: 2Gi }
